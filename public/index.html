<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Buat Kartu Pelajar</title>

    <link rel="stylesheet" href="style.css" />

    <script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  </head>

  <body>
    <div id="formBox" class="formBox">
      <h2>Pilih Template</h2>

      <div class="template">
        <img src="/assets/kartu-template.png" onclick="selectTemplate(this)" alt="Template 1" />
        <img src="/assets/kartu-template2.png" onclick="selectTemplate(this)" alt="Template 2" />
        <img src="/assets/kartu-template3.png" onclick="selectTemplate(this)" alt="Template 3" />
        <img src="/assets/kartu-template4.png" onclick="selectTemplate(this)" alt="Template 4" />
        <img src="/assets/kartu-template5.png" onclick="selectTemplate(this)" alt="Template 5" />
        <img src="/assets/kartu-template6.png" onclick="selectTemplate(this)" alt="Template 6" />
        <img src="/assets/kartu-template7.png" onclick="selectTemplate(this)" alt="Template 7" />
        <img src="/assets/kartu-template8.png" onclick="selectTemplate(this)" alt="Template 8" />
        <img src="/assets/kartu-template9.png" onclick="selectTemplate(this)" alt="Template 9" />
        <img src="/assets/kartu-template10.png" onclick="selectTemplate(this)" alt="Template 10" />
        <img src="/assets/kartu-template11.png" onclick="selectTemplate(this)" alt="Template 11" />





        
      </div>

      <input id="sekolah" placeholder="Nama Sekolah" />
      <input id="alamat" placeholder="Alamat Sekolah" />

      <label for="logo">Logo Sekolah</label>
      <input type="file" id="logo" accept="image/*" />

      <hr />

      <input id="nama" placeholder="Nama Siswa" />
      <input id="nisn" placeholder="NISN" />
      <input id="alamatSiswa" placeholder="Alamat Siswa" />
      <input id="masa" placeholder="Berlaku Sampai" />

      <label for="foto">Foto Siswa</label>
      <input type="file" id="foto" accept="image/*" />

      <button type="button" onclick="handlePreview()">Preview Kartu</button>
    </div>

    <div class="preview" id="preview" style="display: none;">
      <div class="card" id="card">
        <img id="bg" alt="" />
        <img id="logoCard" class="logo" alt="Logo Sekolah" />

        <div id="sekolahCard" class="sekolah"></div>
        <div id="alamatCard" class="alamat"></div>

        <div class="judulKartu">KARTU PELAJAR</div>
        <div class="garisKartu"></div>

        <img id="fotoCard" class="foto" alt="Foto Siswa" />

        <div id="namaCard" class="nama"></div>
        <div id="nisnCard" class="nisn"></div>
        <div id="alamatSiswaCard" class="alamatSiswa"></div>
        <div id="masaCard" class="masa"></div>

        <div id="qrCard" class="qr"></div>
      </div>

      <button type="button" onclick="downloadCard()">
        Download Kartu Gratis
      </button>
    </div>

    <div id="accessDenied" class="accessDenied" style="display:none;">
      <h2>Akses Ditolak</h2>
      <p id="accessDeniedText">Perangkat ini sedang terkunci.</p>
      <a href="https://wa.me/6282353730849" target="_blank" rel="noopener" class="waButton">
        Hubungi Admin WhatsApp
      </a>
    </div>

    <script src="script.js"></script>

    <script>
      window.addEventListener("pageshow", function (event) {
        if (event.persisted) {
          window.location.reload();
        }
      });
    </script>
  </body>
</html>
